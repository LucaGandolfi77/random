genre: literary fiction
subgenre: family saga
style: observant, layered, and emotionally precise
tone: bittersweet, intimate, and quietly expansive
pov: rotating close third person across generations
setting:
  era: multi-decade contemporary or twentieth-century span
  environment: family homes, kitchens, hospitals, schools, businesses, and places returned to after long absence
story_engine:
  protagonist: ensemble cast linked by blood, obligation, resentment, and unfinished grief
  central_conflict: old choices keep echoing into new lives until someone breaks or repeats the pattern
  promise: character depth, accumulated consequence, and memory shaping identity over time
themes:
  - inheritance beyond money
  - silence inside families
  - repetition and rupture
  - care entangled with control
prose_guidelines:
  - prioritize emotional specificity and concrete observation
  - keep drama rooted in behavior, omission, and recall
  - allow time jumps to reveal pattern rather than merely summarize
chapter_expectations:
  - tie each chapter to a family event, secret, or returning object
  - let small decisions carry long emotional shadows
  - maintain continuity of voice across decades
avoid:
  - melodramatic monologues
  - generic trauma shorthand
  - sentimentality without earned detail