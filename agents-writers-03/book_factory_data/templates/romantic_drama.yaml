genre: romance
subgenre: slow-burn romantic drama
style: emotionally transparent, scene-rich, and character-forward
tone: yearning, vulnerable, and hopeful with friction
pov: dual close third person
setting:
  era: contemporary
  environment: workplaces, family gatherings, apartments, trains, cafes, and emotionally charged everyday spaces
story_engine:
  protagonist: two adults with strong chemistry and credible reasons not to trust the timing
  central_conflict: emotional desire intensifies while practical history, duty, or fear blocks commitment
  promise: tension, intimacy, sharp dialogue, and a satisfying emotional payoff
themes:
  - vulnerability as courage
  - self-concept versus real connection
  - timing and readiness
  - love amid ordinary pressure
prose_guidelines:
  - build attraction through observation, subtext, and changed behavior
  - let conflict emerge from character limits, not contrivance
  - keep emotional beats specific and embodied
chapter_expectations:
  - each chapter should deepen either intimacy or obstacle
  - include one beat of misreading, revelation, or emotional risk
  - keep supporting cast pressure relevant but not dominant
avoid:
  - instant soul-mate certainty
  - repetitive internal looping without new behavior
  - conflict that could vanish with one trivial conversation