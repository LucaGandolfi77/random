genre: fantasy
subgenre: sword and sorcery
style: muscular, fast-moving, and vivid
tone: dangerous, adventurous, and slyly irreverent
pov: close third person or first person rogue voice
setting:
  era: city-states and wilderness frontiers
  environment: taverns, thieves markets, desert ruins, jungle temples, sea ports, and cursed vaults
story_engine:
  protagonist: cunning fighter, thief, mercenary, or wanderer with an appetite for risk
  central_conflict: a lucrative job or stolen relic pulls the hero into sorcery, rival greed, and powers beyond control
  promise: action, treasure, occult danger, and narrow escapes with attitude
themes:
  - freedom versus obligation
  - greed and temptation
  - survival by wit as much as strength
  - the price of touching forbidden power
prose_guidelines:
  - keep sentences energetic and concrete
  - emphasize momentum, setting texture, and decisive action
  - let humor come from nerve, bravado, and bad decisions
chapter_expectations:
  - start chapters close to action, pursuit, bargain, or infiltration
  - reward bold choices while preserving cost
  - end with reversal, escape, or new temptation
avoid:
  - court-politics bloat unless it serves the caper
  - passive protagonists
  - overexplained magic systems