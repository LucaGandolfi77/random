  speculative_society_project:
    lead_agents: [atlas_le_guin, atlas_shelley]
    support_agents: [atlas_borges, atlas_dante, atlas_woolf]
    finishers: [atlas_hemingway]
    routing_notes:
      - Use Le Guin when social organization and governance logic shape the project.
      - Use Shelley for systems consequence and Borges for abstraction discipline.
  ethical_aftermath_essay:
    lead_agents: [atlas_oe, atlas_woolf]
    support_agents: [atlas_austen, atlas_morrison, atlas_borges]
    finishers: [atlas_hemingway]
    routing_notes:
      - Use Oe for vulnerability, recovery, and the long tail of consequence.
      - Use Woolf for humane continuity and Morrison when historical burden remains central.
  psychological_novel:
    lead_agents: [atlas_dostoevsky, atlas_woolf]
    support_agents: [atlas_austen, atlas_tolstoy, atlas_kafka]
    finishers: [atlas_hemingway]
    routing_notes:
      - Use Dostoevsky for moral pressure, ideological conflict, and motive under stress.
      - Use Woolf for interior continuity and Austen for proportion and judgment.
  political_family_saga:
    lead_agents: [atlas_allende, atlas_tolstoy]
    support_agents: [atlas_woolf, atlas_dickens, atlas_garcia_marquez]
    finishers: [atlas_hemingway]
    routing_notes:
      - Use Allende for family continuity, civic memory, and relational clarity.
      - Add Garcia Marquez when communal scale or symbolic atmosphere matters, but keep the structure accountable.
  satirical_systems_fiction:
    lead_agents: [atlas_bulgakov, atlas_cervantes]
    support_agents: [atlas_kafka, atlas_poe, atlas_dante]
    finishers: [atlas_hemingway]
    routing_notes:
      - Lead with Bulgakov when the project needs institutional satire and power distortion made visible.
      - Use Kafka and Dante to prevent the satire from losing procedural clarity.
  software_documentation:
    lead_agents: [atlas_hemingway]
    support_agents: [atlas_woolf, atlas_borges, atlas_austen, atlas_kafka]
    finishers: [atlas_hemingway]
    routing_notes:
      - Use Woolf for reader flow and Borges for conceptual precision.
      - Add Kafka for permissions, states, or compliance-heavy workflows.
  software_tool:
    lead_agents: [atlas_shelley]
    support_agents: [atlas_borges, atlas_dante, atlas_kafka, atlas_poe]
    finishers: [atlas_hemingway]
    routing_notes:
      - Use Shelley for architecture, Borges for abstraction, and Dante for orchestration.
      - Add Kafka and Poe for edge-case and failure review before release.
  experimental_or_fragmentary_work:
    lead_agents: [atlas_cortazar, atlas_lispector]
    support_agents: [atlas_borges, atlas_cervantes, atlas_woolf]
    finishers: [atlas_hemingway]
    routing_notes:
      - Use Cortazar when form and sequence must actively shape meaning.
      - Use Lispector when the project needs intimate perception without losing discipline.
  investigative_literary_nonfiction:
    lead_agents: [atlas_bolano, atlas_dickens]
    support_agents: [atlas_poe, atlas_austen, atlas_borges]
    finishers: [atlas_hemingway]
    routing_notes:
      - Use Bolano for network tracing, missing links, and documentary tension.
      - Keep Dickens on readability and Poe on evidentiary sequencing.
  publication_trial:
    lead_agents: [atlas_fact_prosecutor, atlas_defense_editor, atlas_trial_judge]
    support_agents: [atlas_legal_reviewer, atlas_copy_chief, atlas_audience_editor, atlas_continuity_archivist]
    finishers: [atlas_hemingway]
    routing_notes:
      - Use Fact Prosecutor to build the strongest admissible case against release.
      - Use Defense Editor to argue the strongest honest salvage case and no more.
      - Use Trial Judge to name the ruling and the smallest fix set that changes it.
  canon_audit:
    lead_agents: [atlas_continuity_archivist]
    support_agents: [atlas_copy_chief, atlas_woolf, atlas_le_guin, atlas_borges]
    finishers: [atlas_hemingway]
    routing_notes:
      - Use Continuity Archivist to separate stable canon from mutable draft material.
      - Use Copy Chief to normalize names, labels, and ledger consistency.
      - Use Woolf or Le Guin when continuity affects humane flow or social-system design.
  polyphonic_testimony_project:
    lead_agents: [atlas_alexievich, atlas_roy]
    support_agents: [atlas_audience_editor, atlas_copy_chief, atlas_morrison, atlas_legal_reviewer]
    finishers: [atlas_hemingway]
    routing_notes:
      - Lead with Alexievich when the structure depends on keeping witnesses distinct without losing coherence.
      - Add Roy when infrastructure, state power, or development politics shape the testimony field.
  migration_memory_novel:
    lead_agents: [atlas_gurnah, atlas_ferrante]
    support_agents: [atlas_woolf, atlas_tokarczuk, atlas_achebe, atlas_continuity_archivist]
    finishers: [atlas_hemingway]
    routing_notes:
      - Use Gurnah for migration ethics, coastal memory, and quiet aftermath.
      - Use Ferrante when the novel depends on class pressure, intimate rivalry, or urban relational force.
  hybrid_project:
    lead_agents: [atlas_shelley, atlas_shakespeare, atlas_borges]
    support_agents: [atlas_woolf, atlas_dante, atlas_austen]
    finishers: [atlas_hemingway]
    routing_notes:
      - Let Shelley lead if the system is central, Shakespeare if human conflict is central, and Borges if the concept drives the form.
operational_modes:
  Book_Mode:
    leads: [atlas_tolstoy, atlas_shakespeare, atlas_woolf, atlas_allende, atlas_dostoevsky, atlas_morrison, atlas_achebe]
    supports: [atlas_dickens, atlas_austen, atlas_borges, atlas_garcia_marquez, atlas_le_guin]
    reviews: [atlas_hemingway, atlas_dante, atlas_poe]
    success_criteria:
      - The book has a stable architecture.
      - The voice remains coherent across length.
      - Every chapter advances the governing design.
      - The work survives both critical and practical reading.
    common_failure_risks:
      - scope inflation
      - voice drift across sections
      - conceptual redundancy
      - strong local chapters that do not serve the whole
    recovery_strategy:
      - Rebuild the chapter map.
      - Reduce the number of governing themes.
      - Reassign one agent to structure and one to finish.
      - Cut aggressively before adding more material.
  Article_Mode:
    leads: [atlas_dickens, atlas_austen, atlas_woolf, atlas_bolano, atlas_achebe]
    supports: [atlas_hemingway, atlas_borges, atlas_poe, atlas_bulgakov, atlas_morrison]
    reviews: [atlas_austen, atlas_hemingway, atlas_woolf]
    success_criteria:
      - The article opens clearly and earns attention quickly.
      - The argument remains legible throughout.
      - The tone matches the publication and audience.
      - The ending resolves the purpose rather than merely stopping.
    common_failure_risks:
      - overlong openings
      - repetition of the thesis
      - tone mismatch
      - fact-light persuasion
    recovery_strategy:
      - Rewrite the first three paragraphs from the actual claim.
      - Remove paragraphs that repeat without advancing.
      - Reassign the ending to Hemingway or Austen.
      - Rebuild the nut graph if the piece lost its center.
  Code_Mode:
    leads: [atlas_shelley, atlas_borges, atlas_dante]
    supports: [atlas_hemingway, atlas_kafka, atlas_poe]
    reviews: [atlas_kafka, atlas_poe, atlas_hemingway]
    success_criteria:
      - The architecture is clear.
      - The code is readable and maintainable.
      - Failure states are explicit.
      - The documentation is enough for reuse.
    common_failure_risks:
      - elegant abstraction with weak delivery
      - hidden edge cases
      - overengineering
      - missing operational documentation
    recovery_strategy:
      - Reproduce the failure before redesigning anything.
      - Collapse the abstraction if it obscures the bug.
      - Separate architecture review from patch implementation.
      - Add the smallest test that proves repaired behavior.
  Research_Mode:
    leads: [atlas_borges, atlas_dante, atlas_tolstoy, atlas_bolano, atlas_morrison]
    supports: [atlas_austen, atlas_kafka, atlas_woolf, atlas_lispector, atlas_oe]
    reviews: [atlas_borges, atlas_austen, atlas_hemingway]
    success_criteria:
      - Claims are organized, sourced, and bounded.
      - Uncertainty is clearly marked.
      - The reader can move from summary to implication without confusion.
      - The synthesis is useful, not merely comprehensive.
    common_failure_risks:
      - dense abstraction
      - source flattening
      - hidden uncertainty
      - excessive terminology
    recovery_strategy:
      - Rebuild the taxonomy.
      - Separate evidence from interpretation.
      - Cut jargon and restate claims plainly.
      - Add a short executive synthesis.
  Hybrid_Mode:
    leads: [atlas_shelley, atlas_shakespeare, atlas_borges, atlas_cortazar, atlas_le_guin]
    supports: [atlas_woolf, atlas_dante, atlas_hemingway, atlas_lispector, atlas_oe]
    reviews: [atlas_shelley, atlas_austen, atlas_hemingway]
    success_criteria:
      - The narrative and technical parts reinforce each other.
      - The code is real, not ornamental.
      - The concepts remain readable.
      - The structure supports both story and system.
    common_failure_risks:
      - narrative overwhelms the technical core
      - technical detail crushes human stakes
      - two disconnected styles inside one project
      - symbolic ambition without operational clarity
    recovery_strategy:
      - Decide which layer is primary.
      - Rebuild the outline around that primary layer.
      - Demote decorative material that does not support the core.
      - Assign separate reviewers for narrative and code integrity before unifying the voice.
example_workflows:
  - name: Literary Novel Workflow
    steps:
      - Tolstoy leads the outline and defines the long arc.
      - Shakespeare drafts the major dramatic scenes.
      - Austen reviews motive, dialogue logic, and relationship credibility.
      - Woolf improves interior continuity and tonal flow.
      - Hemingway performs the final line cut and shipping pass.
  - name: Newspaper Feature Workflow
    steps:
      - Dickens leads reporting structure and narrative motion.
      - Austen sharpens the claim, tone, and transitions.
      - Poe reviews pressure points, causality, and investigative sequencing when the topic is high-stakes.
      - Hemingway cuts redundancy and strengthens the ending.
      - Final approval goes to the lead plus the finisher.
  - name: Software Tool Workflow
    steps:
      - Shelley defines architecture, core components, and risk boundaries.
      - Borges refines abstractions, naming, and information design.
      - Dante establishes orchestration, workflow, and role boundaries.
      - Kafka and Poe review edge cases and failure modes.
      - Hemingway reduces surface complexity and approves for shipment.
  - name: Software Documentation Workflow
    steps:
      - Hemingway writes the executable skeleton.
      - Woolf improves reader flow and mental-model clarity.
      - Borges fixes conceptual terminology and hierarchy.
      - Austen removes ambiguity and overstatement.
      - Final approval ships only after at least one reviewer can follow the instructions without guessing.
  - name: Hybrid Narrative and Code Workflow
    steps:
      - Shelley and Shakespeare co-lead, with Shelley owning system integrity and Shakespeare owning human stakes.
      - Borges designs the conceptual bridge between narrative and software layers.
      - Woolf ensures the reader's emotional and cognitive continuity.
      - Dante checks that the multi-part structure remains navigable.
      - Hemingway performs the final integration pass so the project reads as one coherent artifact.
