    lead_agents: [atlas_tolstoy, atlas_shakespeare]
    support_agents: [atlas_austen, atlas_woolf, atlas_dickens]
    finishers: [atlas_hemingway]
    routing_notes:
      - Use Tolstoy for large architecture and Shakespeare for scene-driven conflict.
      - Use Austen for character logic and Woolf for interior continuity.
      - Bring Dickens in when serialization or broad cast management matters.
  commercial_nonfiction_book:
    lead_agents: [atlas_tolstoy]
    support_agents: [atlas_dickens, atlas_austen, atlas_borges]
    finishers: [atlas_hemingway]
    routing_notes:
      - Use Tolstoy for scope and chapter architecture.
      - Use Dickens for accessibility and momentum.
      - Use Borges only when the book depends on conceptual scaffolding.
  newspaper_feature:
