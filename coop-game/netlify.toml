[build]
publish = "."

[[headers]]
for = "/sw.js"

[headers.values]
Cache-Control = "no-cache"

[[headers]]
for = "/manifest.webmanifest"

[headers.values]
Cache-Control = "no-cache"

[[headers]]
for = "/icons/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/js/*"

[headers.values]
Cache-Control = "public, max-age=600"

[[headers]]
for = "/style.css"

[headers.values]
Cache-Control = "public, max-age=600"