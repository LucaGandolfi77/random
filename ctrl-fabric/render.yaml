services:
  - type: web
    name: ctrl-fabric-dashboard
    env: python
    buildCommand: pip install -r web/requirements.txt
    startCommand: python web/app.py
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ctrl-fabric-db
          property: connectionString
    autoDeploy: true

databases:
  - name: ctrl-fabric-db