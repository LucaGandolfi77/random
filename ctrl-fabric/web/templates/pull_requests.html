{% extends "base.html" %}
{% block title %}Pull Requests{% endblock %}
{% block content %}
<div class="pr-header">
    <h2>Pull Requests</h2>
    <a href="#" class="button">New Pull Request</a>
</div>

<div class="pr-list">
    {% for pr in prs %}
    <div class="pr-item">
        <span class="pr-status">{{ pr.status }}</span>
        <h4>{{ pr.title }}</h4>
        <p>{{ pr.description }}</p>
        <span class="pr-author">by {{ pr.author }} on {{ pr.created_at.strftime('%Y-%m-%d') }}</span>
    </div>
    {% endfor %}
</div>
{% endblock %}
