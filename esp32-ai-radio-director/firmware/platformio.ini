[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps =
    arduino-libraries/ArduinoJson@^7.0.0
    bodmer/TFT_eSPI@^2.5.0
    paulstoffregen/Time@^1.6.0
    bblanchon/ArduinoLZC@^1.0.0

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    arduino-libraries/ArduinoJson@^7.0.0
    bodmer/TFT_eSPI@^2.5.0
    paulstoffregen/Time@^1.6.0