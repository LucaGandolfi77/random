<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Fumetto - 4 Scene</title>
<style>
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    font-family: 'Comic Sans MS', cursive, sans-serif;
  }
  .comic-strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    max-width: 960px;
    padding: 24px;
  }
  .panel {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    overflow: hidden;
    transition: transform 0.2s;
  }
  .panel:hover { transform: scale(1.02); }
  .panel svg { display: block; width: 100%; height: auto; }
</style>
</head>
<body>
<div class="comic-strip">

<!-- PANEL 1 -->
<div class="panel">
<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e8f4f8"/><stop offset="100%" stop-color="#d1e8f0"/></linearGradient>
  </defs>
  <rect width="300" height="400" fill="url(#bg1)"/>
  <text x="150" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">SCENA 1</text>

  <!-- Computer desk -->
  <rect x="60" y="240" width="180" height="10" rx="3" fill="#8B4513"/>
  <rect x="70" y="200" width="160" height="40" rx="5" fill="#34495e"/>
  <rect x="75" y="205" width="150" height="30" rx="3" fill="#2ecc71" opacity="0.3"/>
  <!-- Screen glow lines -->
  <line x1="85" y1="215" x2="215" y2="215" stroke="#2ecc71" stroke-width="1.5" opacity="0.6"/>
  <line x1="85" y1="225" x2="200" y2="225" stroke="#2ecc71" stroke-width="1.5" opacity="0.6"/>

  <!-- AI character - sleepy -->
  <circle cx="150" cy="140" r="50" fill="#f0c040" stroke="#d4a030" stroke-width="3"/>
  <!-- Sleepy eyes -->
  <line x1="130" y1="130" x2="142" y2="130" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <line x1="158" y1="130" x2="170" y2="130" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <!-- Smile -->
  <path d="M138 150 Q150 160 162 150" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ZZZ -->
  <text x="200" y="100" font-size="24" fill="#7f8c8d" opacity="0.7" font-style="italic">z</text>
  <text x="215" y="85" font-size="28" fill="#7f8c8d" opacity="0.5" font-style="italic">z</text>
  <text x="235" y="65" font-size="32" fill="#7f8c8d" opacity="0.3" font-style="italic">Z</text>

  <!-- Notification bell -->
  <text x="230" y="180" font-size="28">🔔</text>
  <text x="240" y="168" font-size="12" fill="#e74c3c" font-weight="bold">1</text>

  <!-- Caption -->
  <text x="150" y="380" text-anchor="middle" font-size="13" fill="#555" font-style="italic">"Zzz... un altro giorno..."</text>
</svg>
</div>

<!-- PANEL 2 -->
<div class="panel">
<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fff8e1"/><stop offset="100%" stop-color="#ffe082"/></linearGradient>
  </defs>
  <rect width="300" height="400" fill="url(#bg2)"/>
  <text x="150" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">SCENA 2</text>

  <!-- AI character - alert! -->
  <circle cx="150" cy="130" r="55" fill="#f0c040" stroke="#d4a030" stroke-width="3"/>
  <!-- Wide open eyes -->
  <circle cx="132" cy="120" r="8" fill="white" stroke="#333" stroke-width="2"/>
  <circle cx="168" cy="120" r="8" fill="white" stroke="#333" stroke-width="2"/>
  <circle cx="134" cy="122" r="4" fill="#333"/>
  <circle cx="170" cy="122" r="4" fill="#333"/>
  <!-- Surprised mouth -->
  <ellipse cx="150" cy="148" rx="8" ry="6" fill="#c0392b"/>

  <!-- Speech bubble -->
  <path d="M210 80 Q280 60 260 110 L240 105 L225 130 L235 100 Q210 100 210 80Z" fill="white" stroke="#333" stroke-width="2"/>
  <text x="235" y="95" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">Nuovo msg!</text>

  <!-- User icon -->
  <circle cx="90" cy="220" r="20" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <circle cx="90" cy="212" r="6" fill="#ecf0f1"/>
  <path d="M75 230 Q90 240 105 230" fill="none" stroke="#ecf0f1" stroke-width="3"/>

  <!-- Chat bubble from user -->
  <rect x="40" y="255" width="200" height="60" rx="10" fill="white" stroke="#3498db" stroke-width="2"/>
  <polygon points="60,255 70,245 80,255" fill="white" stroke="#3498db" stroke-width="2"/>
  <text x="140" y="280" text-anchor="middle" font-size="14" fill="#2c3e50" font-weight="bold">"Dove sono le mie</text>
  <text x="140" y="300" text-anchor="middle" font-size="14" fill="#2c3e50" font-weight="bold">chiavi della macchina?"</text>

  <!-- Exclamation marks -->
  <text x="220" y="145" font-size="22" fill="#e74c3c" font-weight="bold">!!</text>

  <!-- Caption -->
  <text x="150" y="380" text-anchor="middle" font-size="13" fill="#555" font-style="italic">"Missione: trova chiavi!"</text>
</svg>
</div>

<!-- PANEL 3 -->
<div class="panel">
<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fce4ec"/><stop offset="100%" stop-color="#f8bbd0"/></linearGradient>
  </defs>
  <rect width="300" height="400" fill="url(#bg3)"/>
  <text x="150" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">SCENA 3</text>

  <!-- AI character - stressed! -->
  <circle cx="100" cy="120" r="45" fill="#f0c040" stroke="#d4a030" stroke-width="3"/>
  <!-- Determined eyes -->
  <line x1="80" y1="112" x2="95" y2="112" stroke="#333" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="105" y1="112" x2="120" y2="112" stroke="#333" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Grit teeth -->
  <path d="M88 130 Q100 137 112 130" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="95" y="130" width="10" height="4" rx="1" fill="white" stroke="#333" stroke-width="1"/>

  <!-- Sweat drops -->
  <path d="M140 90 Q145 80 145 90 Q145 98 140 90Z" fill="#74b9ff"/>
  <path d="M150 105 Q155 95 155 105 Q155 113 150 105Z" fill="#74b9ff"/>

  <!-- Searching visualization - database/server icons flying -->
  <rect x="180" y="80" width="55" height="40" rx="6" fill="#34495e"/>
  <rect x="185" y="85" width="45" height="8" rx="2" fill="#3498db"/>
  <rect x="185" y="96" width="45" height="8" rx="2" fill="#2980b9"/>
  <rect x="185" y="107" width="45" height="8" rx="2" fill="#1abc9c"/>
  <text x="207" y="136" text-anchor="middle" font-size="10" fill="#7f8c8d">DB</text>

  <rect x="200" y="155" width="55" height="40" rx="6" fill="#34495e"/>
  <rect x="205" y="160" width="45" height="8" rx="2" fill="#e74c3c"/>
  <rect x="205" y="171" width="45" height="8" rx="2" fill="#c0392b"/>
  <rect x="205" y="182" width="45" height="8" rx="2" fill="#e67e22"/>
  <text x="227" y="211" text-anchor="middle" font-size="10" fill="#7f8c8d">LOG</text>

  <!-- Search lines radiating -->
  <line x1="145" y1="120" x2="175" y2="85" stroke="#e74c3c" stroke-width="1" opacity="0.5"/>
  <line x1="145" y1="120" x2="180" y2="120" stroke="#e74c3c" stroke-width="1" opacity="0.5"/>
  <line x1="145" y1="120" x2="170" y2="160" stroke="#e74c3c" stroke-width="1" opacity="0.5"/>

  <!-- Processing text -->
  <text x="150" y="300" text-anchor="middle" font-size="13" fill="#c0392b" font-weight="bold">Ricerca in corso...</text>
  <text x="150" y="320" text-anchor="middle" font-size="12" fill="#7f8c8d">▸ scannerizzando armadi</text>
  <text x="150" y="338" text-anchor="middle" font-size="12" fill="#7f8c8d">▸ controllando messaggi</text>
  <text x="150" y="356" text-anchor="middle" font-size="12" fill="#7f8c8d">▸ analizzando foto...</text>

  <!-- Spinning loading -->
  <text x="50" y="360" font-size="18" fill="#e74c3c">⏳</text>

  <!-- Caption -->
  <text x="150" y="385" text-anchor="middle" font-size="13" fill="#555" font-style="italic">"Dove sono finite?! 😰"</text>
</svg>
</div>

<!-- PANEL 4 -->
<div class="panel">
<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e8f8f5"/><stop offset="100%" stop-color="#a8e6cf"/></linearGradient>
  </defs>
  <rect width="300" height="400" fill="url(#bg4)"/>
  <text x="150" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">SCENA 4</text>

  <!-- AI character - smug -->
  <circle cx="150" cy="120" r="50" fill="#f0c040" stroke="#d4a030" stroke-width="3"/>
  <!-- Smug eyes (half-lidded) -->
  <path d="M125 112 L140 112" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <path d="M160 112 L175 112" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <!-- Smug smile -->
  <path d="M132 130 Q150 145 168 130" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <!-- Sunglasses for extra smug -->
  <ellipse cx="133" cy="112" rx="12" ry="6" fill="#2c3e50" opacity="0.0"/>

  <!-- Lightbulb -->
  <text x="205" y="90" font-size="30">💡</text>

  <!-- Speech bubble -->
  <path d="M190 35 Q260 20 255 70 L240 70 L225 90 L235 65 Q210 65 190 55Z" fill="white" stroke="#27ae60" stroke-width="2.5"/>
  <text x="222" y="52" text-anchor="middle" font-size="11" fill="#27ae60" font-weight="bold">Trovato! 🎯</text>

  <!-- User on the right, embarrassed -->
  <circle cx="90" cy="220" r="20" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <!-- Shy/embarrassed face -->
  <path d="M78 215 L88 218" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M92 218 L102 215" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Sweat drop on user -->
  <path d="M75 200 Q78 192 78 200 Q78 206 75 200Z" fill="#74b9ff"/>

  <!-- Chat bubble -->
  <rect x="40" y="255" width="200" height="60" rx="10" fill="white" stroke="#27ae60" stroke-width="2"/>
  <polygon points="80,255 90,245 100,255" fill="white" stroke="#27ae60" stroke-width="2"/>
  <text x="140" y="278" text-anchor="middle" font-size="13" fill="#2c3e50" font-weight="bold">"Le tue chiavi sono</text>
  <text x="140" y="298" text-anchor="middle" font-size="13" fill="#e74c3c" font-weight="bold">NELLA TUA MANO</text>

  <!-- Plot twist - a hand holding keys -->
  <g transform="translate(210, 280)">
    <circle cx="15" cy="15" r="18" fill="#f5cba7" stroke="#e0a97a" stroke-width="2"/>
    <rect x="28" y="5" width="18" height="6" rx="2" fill="#f1c40f" stroke="#f39c12" stroke-width="1.5"/>
    <circle cx="28" cy="8" r="4" fill="none" stroke="#f39c12" stroke-width="1.5"/>
    <text x="15" y="50" text-anchor="middle" font-size="10" fill="#7f8c8d">🔑</text>
  </g>

  <!-- Caption -->
  <text x="150" y="370" text-anchor="middle" font-size="13" fill="#555" font-style="italic">"Sempre stato lì... 😅"</text>

  <!-- Bottom punchline -->
  <text x="150" y="390" text-anchor="middle" font-size="11" fill="#e74c3c" font-weight="bold">Morale: controlla le tue mani PRIMA di chiamarmi</text>
</svg>
</div>

</div>
</body>
</html>
