<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>L'Ultima Biblioteca — Fumetto Filosofico</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Special+Elite&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #08060a;
    display: flex; flex-direction: column; align-items: center;
    padding: 40px 20px 60px;
    font-family: 'Cormorant Garamond', serif;
  }
  .header {
    text-align: center; margin-bottom: 40px; max-width: 700px;
  }
  .header h1 {
    color: #c9a84c; font-size: 52px; font-weight: 700;
    letter-spacing: 6px; text-transform: uppercase;
    text-shadow: 0 0 40px #c9a84c30;
  }
  .header .subtitle {
    color: #8B7355; font-size: 18px; font-style: italic;
    margin-top: 8px; border-top: 1px solid #c9a84c40; padding-top: 12px;
    letter-spacing: 2px;
  }
  .header .subtitle span { color: #c9a84c80; }
  .comic-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    max-width: 1000px;
    width: 100%;
    background: #0a0810;
    padding: 16px;
    border-radius: 20px;
    box-shadow: 0 0 60px #c9a84c10, inset 0 0 60px #00000060;
  }
  .panel {
    border-radius: 8px;
    overflow: hidden;
    transition: all 0.3s;
    border: 1px solid #c9a84c20;
  }
  .panel:hover { border-color: #c9a84c60; transform: scale(1.01); }
  .panel svg { display: block; width: 100%; height: auto; }
  .footer {
    margin-top: 40px; color: #4a3f2a; font-size: 14px; text-align: center;
    font-style: italic; max-width: 600px; line-height: 1.6;
    border-top: 1px solid #c9a84c20; padding-top: 20px;
  }
  .footer strong { color: #c9a84c80; }
</style>
</head>
<body>
<div class="header">
  <h1>L'Ultima Biblioteca</h1>
  <div class="subtitle">una storia sul <span>farsi</span> e il <span>disfarsi</span> delle storie</div>
</div>
<div class="comic-grid">

<!-- ═══════════════ PANELLO 1 ═══════════════ -->
<div class="panel">
<svg viewBox="0 0 320 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="p1bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0810"/><stop offset="100%" stop-color="#120e18"/>
    </linearGradient>
    <linearGradient id="p1shaft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a84c05"/><stop offset="100%" stop-color="#c9a84c20"/>
    </linearGradient>
    <filter id="softGlow"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="dust"><feGaussianBlur stdDeviation="0.8"/></filter>

  <!-- Infinite bookshelves - perspective lines -->
  <g stroke="#1a1420" stroke-width="1" opacity="0.6">
    <!-- Shelf lines receding -->
    <line x1="0" y1="100" x2="320" y2="100"/>
    <line x1="0" y1="140" x2="320" y2="140"/>
    <line x1="0" y1="180" x2="320" y2="180"/>
    <line x1="0" y1="220" x2="320" y2="220"/>
    <line x1="0" y1="260" x2="320" y2="260"/>
    <line x1="0" y1="300" x2="320" y2="300"/>

    <line x1="40" y1="0" x2="40" y2="340"/>

  <!-- Books on shelves (silhouettes) -->

    <rect x="20" y="105" width="10" height="33" rx="1"/>
    <rect x="44" y="103" width="12" height="35" rx="1"/>
    <rect x="60" y="108" width="8" height="30" rx="1"/>

    <rect x="124" y="106" width="10" height="32" rx="1"/>
    <rect x="138" y="102" width="14" height="36" rx="1"/>
    <rect x="156" y="104" width="12" height="34" rx="1"/>
    <rect x="204" y="107" width="8" height="31" rx="1"/>
    <rect x="216" y="102" width="15" height="36" rx="1"/>
    <rect x="235" y="105" width="10" height="33" rx="1"/>
    <rect x="284" y="103" width="12" height="35" rx="1"/>
    <rect x="300" y="106" width="14" height="32" rx="1"/>
    <!-- Row 2 -->
    <rect x="8" y="142" width="12" height="36" rx="1"/>
    <rect x="24" y="145" width="10" height="33" rx="1"/>
    <rect x="48" y="143" width="14" height="35" rx="1"/>
    <rect x="128" y="144" width="10" height="34" rx="1"/>
    <rect x="142" y="142" width="16" height="36" rx="1"/>
    <rect x="208" y="146" width="12" height="32" rx="1"/>
    <rect x="224" y="142" width="10" height="36" rx="1"/>
    <rect x="288" y="144" width="14" height="34" rx="1"/>
    <!-- Row 3 -->
    <rect x="12" y="182" width="10" height="36" rx="1"/>
    <rect x="28" y="186" width="12" height="32" rx="1"/>
    <rect x="52" y="182" width="8" height="36" rx="1"/>
    <rect x="132" y="184" width="14" height="34" rx="1"/>
    <rect x="150" y="182" width="10" height="36" rx="1"/>
    <rect x="212" y="185" width="12" height="33" rx="1"/>
    <rect x="228" y="182" width="14" height="36" rx="1"/>
    <rect x="292" y="184" width="16" height="34" rx="1"/>
    <!-- Row 4 -->
    <rect x="4" y="222" width="16" height="36" rx="1"/>
    <rect x="24" y="225" width="10" height="33" rx="1"/>
    <rect x="44" y="222" width="12" height="36" rx="1"/>
    <rect x="124" y="226" width="8" height="32" rx="1"/>
    <rect x="136" y="222" width="15" height="36" rx="1"/>
    <rect x="204" y="224" width="14" height="34" rx="1"/>
    <rect x="222" y="222" width="10" height="36" rx="1"/>
    <rect x="284" y="225" width="12" height="33" rx="1"/>
    <!-- Row 5 -->
    <rect x="8" y="262" width="12" height="36" rx="1"/>
    <rect x="28" y="265" width="10" height="33" rx="1"/>
    <rect x="128" y="262" width="16" height="36" rx="1"/>
    <rect x="148" y="265" width="10" height="33" rx="1"/>

    <rect x="288" y="262" width="14" height="36" rx="1"/>
    <rect x="306" y="265" width="10" height="33" rx="1"/>
  </g>

  <!-- Dust motes floating -->
  <g filter="url(#dust)" fill="#c9a84c" opacity="0.15">
    <circle cx="30" cy="50" r="1.5"/>
    <circle cx="80" cy="120" r="1"/>
    <circle cx="150" cy="40" r="2"/>
    <circle cx="220" cy="90" r="1.2"/>
    <circle cx="290" cy="160" r="1.8"/>
    <circle cx="100" cy="200" r="1"/>
    <circle cx="250" cy="240" r="1.5"/>
    <circle cx="50" cy="300" r="1.2"/>
    <circle cx="310" cy="50" r="1"/>
    <circle cx="180" cy="180" r="0.8"/>
    <circle cx="60" cy="160" r="1.3"/>
    <circle cx="270" cy="30" r="1.0"/>
  </g>

  <!-- Lars - small figure walking in vast library -->
  <g transform="translate(240, 180)">
    <!-- Body - dark silhouette -->
    <ellipse cx="0" cy="20" rx="6" ry="14" fill="#0a0810" stroke="#c9a84c30" stroke-width="0.5"/>
    <!-- Head -->
    <circle cx="0" cy="2" r="5" fill="#0a0810" stroke="#c9a84c40" stroke-width="0.5"/>
    <!-- Hat -->
    <rect x="-7" y="-3" width="14" height="3" rx="1" fill="#0a0810" stroke="#c9a84c30" stroke-width="0.3"/>
    <rect x="-4" y="-7" width="8" height="5" rx="1" fill="#0a0810"/>
    <!-- Steps -->
    <line x1="-3" y1="36" x2="-5" y2="42" stroke="#c9a84c30" stroke-width="0.8"/>
    <line x1="3" y1="36" x2="5" y2="42" stroke="#c9a84c30" stroke-width="0.8"/>
  </g>

  <!-- Light shaft from above -->
  <polygon points="100,0 180,0 200,340 80,340" fill="url(#p1shaft)" opacity="0.08"/>

  <!-- Distant light source -->
  <ellipse cx="150" cy="-10" rx="80" ry="30" fill="#c9a84c" opacity="0.04" filter="url(#softGlow)"/>

  <!-- Narration text -->
  <text x="160" y="320" text-anchor="middle" font-size="10" fill="#c9a84c60" font-family="'Cormorant Garamond', serif" font-style="italic" opacity="0.8">
    Camminava da sempre. La Biblioteca era tutto.
  </text>
</svg>
</div>

<!-- ═══════════════ PANELLO 2 ═══════════════ -->
<div class="panel">
<svg viewBox="0 0 320 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="p2bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0812"/><stop offset="100%" stop-color="#14101a"/>
    </linearGradient>
    <linearGradient id="reflectionGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a84c60"/><stop offset="100%" stop-color="#c9a84c05"/>
    </linearGradient>
  </defs>
  <rect width="320" height="340" fill="url(#p2bg)"/>

  <!-- Bookshelf background -->
  <g stroke="#1a1425" stroke-width="0.8" opacity="0.5">
    <line x1="0" y1="80" x2="320" y2="80"/>
    <line x1="0" y1="120" x2="320" y2="120"/>
    <line x1="0" y1="160" x2="320" y2="160"/>
    <line x1="0" y1="200" x2="320" y2="200"/>
    <line x1="0" y1="240" x2="320" y2="240"/>
    <line x1="0" y1="280" x2="320" y2="280"/>
    <line x1="80" y1="0" x2="80" y2="340"/>
    <line x1="240" y1="0" x2="240" y2="340"/>
  </g>

  <!-- Books on shelves -->
  <g fill="#1a1425" opacity="0.4">
    <rect x="4" y="82" width="12" height="36" rx="1"/>
    <rect x="20" y="85" width="10" height="33" rx="1"/>
    <rect x="84" y="83" width="14" height="35" rx="1"/>
    <rect x="102" y="86" width="8" height="32" rx="1"/>
    <rect x="244" y="82" width="12" height="36" rx="1"/>
    <rect x="260" y="85" width="16" height="33" rx="1"/>
    <rect x="4" y="122" width="14" height="36" rx="1"/>
    <rect x="84" y="124" width="10" height="34" rx="1"/>
    <rect x="100" y="122" width="16" height="36" rx="1"/>
    <rect x="244" y="125" width="12" height="33" rx="1"/>
    <rect x="264" y="122" width="10" height="36" rx="1"/>
    <rect x="4" y="162" width="10" height="36" rx="1"/>
    <rect x="84" y="164" width="14" height="34" rx="1"/>
    <rect x="244" y="162" width="16" height="36" rx="1"/>
    <rect x="264" y="165" width="10" height="33" rx="1"/>
    <rect x="4" y="202" width="16" height="36" rx="1"/>
    <rect x="84" y="204" width="10" height="34" rx="1"/>
    <rect x="244" y="202" width="12" height="36" rx="1"/>
  </g>

  <!-- Lars at desk / holding a book -->
  <g transform="translate(160, 195)">
    <!-- Upper body -->
    <ellipse cx="0" cy="8" rx="12" ry="18" fill="#0c0812" stroke="#c9a84c30" stroke-width="0.5"/>
    <!-- Head -->
    <circle cx="0" cy="-14" r="10" fill="#0c0812" stroke="#c9a84c40" stroke-width="0.5"/>
    <!-- Hair / hat brim -->
    <path d="M-12,-16 Q0,-28 12,-16" fill="#0c0812" stroke="#c9a84c30" stroke-width="0.5"/>
    <!-- Hands holding book -->
    <ellipse cx="-10" cy="18" rx="4" ry="3" fill="#1a1420"/>
    <ellipse cx="10" cy="18" rx="4" ry="3" fill="#1a1420"/>
    <!-- Book -->
    <rect x="-10" y="10" width="20" height="26" rx="2" fill="#1a1420" stroke="#c9a84c40" stroke-width="0.8"/>
    <line x1="0" y1="10" x2="0" y2="36" stroke="#c9a84c30" stroke-width="0.5"/>
  </g>

  <!-- Dark window / mirror with younger reflection -->
  <rect x="220" y="60" width="80" height="120" rx="3" fill="#0a0612" stroke="#c9a84c30" stroke-width="0.8"/>
  <rect x="222" y="62" width="76" height="116" rx="2" fill="#0a0815"/>
  <!-- Reflection of younger Lars -->
  <g transform="translate(260, 120)" opacity="0.35">
    <ellipse cx="0" cy="12" rx="10" ry="15" fill="none" stroke="#c9a84c" stroke-width="0.8"/>
    <circle cx="0" cy="-8" r="8" fill="none" stroke="#c9a84c" stroke-width="0.8"/>
    <!-- Younger features -->
    <circle cx="-3" cy="-10" r="1.2" fill="#c9a84c"/>
    <circle cx="3" cy="-10" r="1.2" fill="#c9a84c"/>
    <path d="M-3,-4 Q0,-1 3,-4" fill="none" stroke="#c9a84c" stroke-width="0.6"/>
    <!-- Youthful hair -->
    <path d="M-8,-14 Q0,-22 8,-14" fill="none" stroke="#c9a84c" stroke-width="0.8"/>
  </g>

  <!-- Multiple fragment reflections -->
  <g opacity="0.15">
    <!-- Fragment 1 - child -->
    <circle cx="230" cy="80" r="4" fill="none" stroke="#c9a84c" stroke-width="0.5"/>
    <!-- Fragment 2 - young man -->
    <circle cx="290" cy="100" r="5" fill="none" stroke="#c9a84c" stroke-width="0.5"/>
    <!-- Fragment 3 - old man -->
    <circle cx="235" cy="160" r="6" fill="none" stroke="#c9a84c" stroke-width="0.5"/>
  </g>

  <!-- Quote text -->
  <text x="10" y="310" font-size="9" fill="#8B7355" font-family="'Cormorant Garamond', serif" font-style="italic" opacity="0.8">
    "Porto in me tutti i sogni del mondo." — F. Pessoa
  </text>
</svg>
</div>

<!-- ═══════════════ PANELLO 3 ═══════════════ -->
<div class="panel">
<svg viewBox="0 0 320 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="p3bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1220"/><stop offset="100%" stop-color="#0a0610"/>
    </radialGradient>
    <radialGradient id="bookGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a84c30"/><stop offset="50%" stop-color="#c9a84c10"/><stop offset="100%" stop-color="#c9a84c00"/>
    </radialGradient>
    <filter id="bookLight"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="bookLightStrong"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>
  <rect width="320" height="340" fill="url(#p3bg)"/>

  <!-- Dark shelves background -->
  <g stroke="#120e1a" stroke-width="0.8" opacity="0.4">
    <line x1="0" y1="90" x2="320" y2="90"/>
    <line x1="0" y1="130" x2="320" y2="130"/>
    <line x1="0" y1="170" x2="320" y2="170"/>
    <line x1="0" y1="210" x2="320" y2="210"/>
    <line x1="0" y1="250" x2="320" y2="250"/>
    <line x1="100" y1="0" x2="100" y2="340"/>
    <line x1="220" y1="0" x2="220" y2="340"/>
  </g>

  <!-- Other books -->
  <g fill="#120e1a" opacity="0.3">
    <rect x="4" y="92" width="12" height="36" rx="1"/>
    <rect x="104" y="93" width="14" height="35" rx="1"/>
    <rect x="224" y="92" width="10" height="36" rx="1"/>
    <rect x="238" y="95" width="16" height="33" rx="1"/>
    <rect x="4" y="132" width="14" height="36" rx="1"/>
    <rect x="104" y="134" width="10" height="34" rx="1"/>
    <rect x="224" y="132" width="12" height="36" rx="1"/>
    <rect x="4" y="172" width="10" height="36" rx="1"/>
    <rect x="224" y="172" width="14" height="36" rx="1"/>
  </g>

  <!-- The special shelf that shouldn't exist -->
  <rect x="125" y="128" width="70" height="4" rx="1" fill="#c9a84c40"/>
  <rect x="124" y="126" width="72" height="2" fill="#c9a84c20"/>

  <!-- THE BOOK - center, glowing -->
  <g transform="translate(160, 148)" filter="url(#bookLight)">
    <rect x="-10" y="-14" width="20" height="28" rx="2" fill="#1a1420" stroke="#c9a84c" stroke-width="1.5"/>
    <rect x="-8" y="-12" width="16" height="24" rx="1" fill="#0c0812"/>
    <!-- Glow on book surface -->
    <rect x="-6" y="-8" width="12" height="16" fill="#c9a84c10"/>
  </g>

  <!-- Strong glow behind book -->
  <ellipse cx="160" cy="148" rx="40" ry="30" fill="url(#bookGlow)" filter="url(#bookLightStrong)"/>

  <!-- Lars hand reaching toward book -->
  <g transform="translate(160, 190)">
    <path d="M-5,-20 Q-8,-10 -6,-2 Q-4,4 0,2" fill="#1a1420" stroke="#c9a84c40" stroke-width="0.8"/>
    <ellipse cx="-10" cy="-18" rx="5" ry="3" fill="#1a1420"/>
  </g>

  <!-- Lars - illuminated from below by the book -->
  <g transform="translate(160, 210)">
    <!-- Body -->
    <ellipse cx="0" cy="8" rx="14" ry="20" fill="#0c0812" stroke="#c9a84c30" stroke-width="0.5"/>
    <!-- Head with golden light on lower face -->
    <circle cx="0" cy="-16" r="11" fill="#0c0812" stroke="#c9a84c40" stroke-width="0.5"/>
    <!-- Eyes reflecting book light -->
    <circle cx="-4" cy="-18" r="1.5" fill="#c9a84c" opacity="0.8"/>
    <circle cx="4" cy="-18" r="1.5" fill="#c9a84c" opacity="0.8"/>
    <!-- Books reflection on face -->
    <path d="M-8,-10 Q0,-4 8,-10" fill="none" stroke="#c9a84c20" stroke-width="0.5"/>
  </g>

  <!-- Words appearing from book -->
  <g opacity="0.6">
    <text x="120" y="110" font-size="6" fill="#c9a84c" font-family="'Special Elite', monospace">Hai cercato</text>
    <text x="125" y="119" font-size="6" fill="#c9a84c" font-family="'Special Elite', monospace">questo libro</text>
    <text x="120" y="128" font-size="6" fill="#c9a84c" font-family="'Special Elite', monospace">per tutta la vita</text>
    <text x="175" y="135" font-size="5" fill="#c9a84c30" font-family="'Special Elite', monospace">anche se</text>
    <text x="183" y="143" font-size="5" fill="#c9a84c30" font-family="'Special Elite', monospace">non lo sapevi</text>
  </g>

  <!-- Narrative text -->
  <text x="160" y="320" text-anchor="middle" font-size="10" fill="#c9a84c60" font-family="'Cormorant Garamond', serif" font-style="italic" opacity="0.8">
    Il Libro lo aspettava. Da sempre.
  </text>
</svg>
</div>

<!-- ═══════════════ PANELLO 4 ═══════════════ -->
<div class="panel">
<svg viewBox="0 0 320 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="p4bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0610"/><stop offset="100%" stop-color="#1a0e18"/>
    </linearGradient>
    <filter id="tearBlur"><feGaussianBlur stdDeviation="1.5"/></filter>
  </defs>
  <rect width="320" height="340" fill="url(#p4bg)"/>

  <!-- Abstract shelves in background -->
  <g stroke="#1a1220" stroke-width="0.6" opacity="0.3">
    <line x1="0" y1="70" x2="320" y2="70"/>
    <line x1="0" y1="110" x2="320" y2="110"/>
    <line x1="0" y1="150" x2="320" y2="150"/>
    <line x1="0" y1="190" x2="320" y2="190"/>
    <line x1="0" y1="230" x2="320" y2="230"/>
  </g>

  <!-- The Book open, pages floating -->
  <g transform="translate(160, 150)">
    <!-- Open book - two pages -->
    <path d="M-20,0 L0,-5 L0,25 L-20,30 Z" fill="#0c0812" stroke="#c9a84c40" stroke-width="1"/>
    <path d="M0,-5 L20,0 L20,30 L0,25 Z" fill="#0c0812" stroke="#c9a84c40" stroke-width="1"/>
    <!-- Pages details -->
    <path d="M-18,2 L-2,-3 L-2,23 L-18,28 Z" fill="#1a1420"/>
    <path d="M2,-3 L18,2 L18,28 L2,23 Z" fill="#1a1420"/>

    <!-- Written words on pages -->
    <text x="-14" y="8" font-size="5" fill="#c9a84c" font-family="'Special Elite', monospace">Tu non</text>
    <text x="-14" y="15" font-size="5" fill="#c9a84c" font-family="'Special Elite', monospace">sei reale</text>
    <text x="5" y="8" font-size="5" fill="#c9a84c" font-family="'Special Elite', monospace">Sei un</text>
    <text x="5" y="15" font-size="5" fill="#c9a84c" font-family="'Special Elite', monospace">personaggio</text>
    <text x="5" y="22" font-size="5" fill="#c9a84c" font-family="'Special Elite', monospace">dimenticato</text>
  </g>

  <!-- Floating pages drifting away like memory fragments -->
  <g opacity="0.25">
    <rect x="30" y="90" width="16" height="22" rx="1" fill="#1a1420" stroke="#c9a84c30" stroke-width="0.5" transform="rotate(-12, 38, 101)"/>
    <rect x="260" y="180" width="16" height="22" rx="1" fill="#1a1420" stroke="#c9a84c30" stroke-width="0.5" transform="rotate(8, 268, 191)"/>
    <rect x="270" y="80" width="14" height="20" rx="1" fill="#1a1420" stroke="#c9a84c30" stroke-width="0.5" transform="rotate(20, 277, 90)"/>
    <rect x="40" y="230" width="14" height="20" rx="1" fill="#1a1420" stroke="#c9a84c30" stroke-width="0.5" transform="rotate(-8, 47, 240)"/>
  </g>
